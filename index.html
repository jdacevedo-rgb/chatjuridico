    .msg {

        margin-top: 10px;
        max-width: 100%;

    .optionBtn {
        text-align: left;
        padding: 12px;
        background: #334155;
        border: 1px solid #475569;
        color: var(--text-white);
        border-radius: 8px;
        cursor: pointer;
        font-size: 0.9rem;

    .optionBtn:hover {
        background: #475569;
        border-color: var(--primary);
    }

    #inputArea {

        padding: 15px 20px; 
        background: var(--bg-input); 
        border-top: 1px solid #334155;
        gap: 10px;
        align-items: center;
    }
    input { 
        flex: 1; 
        padding: 12px; 
        border: 1px solid #334155; 
        border-radius: 6px; 
        background: var(--bg-card); 
        color: var(--text-white); 
        outline: none; 
        font-size: 0.95rem;
    }
    input:focus { border-color: var(--primary); }
    
    button { 
        padding: 12px 24px; 
        cursor: pointer; 
        border: none; 
        border-radius: 6px; 
        font-weight: 600; 
        font-size: 0.9rem;
        transition: background 0.2s;
    }
    .btn-enviar { background: var(--primary); color: var(--text-white); }
    .btn-enviar:hover { background: var(--primary-hover); }
    
    .btn-word { 
        background: var(--success); 
        color: var(--text-white); 
        display: none; /* Se activa solo al final del flujo */
    }
    .btn-word:hover { background: var(--success-hover); }

function addMsg(text, type, esAlerta = false){
    let div = document.createElement("div");
    div.className = "msg " + type + (esAlerta ? " alerta-riesgo" : "");
    div.innerHTML = text;
    document.getElementById("chat").appendChild(div);
    document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
}

function renderOpciones(opciones) {
    if(!opciones || opciones.length === 0) return;
    
    let container = document.createElement("div");
    container.className = "btn-container";
    
    opciones.forEach(opt => {
        let btn = document.createElement("button");
        btn.className = "optionBtn";
        btn.innerText = opt.texto;
        btn.onclick = () => procesarRespuesta(opt.texto, opt.valor);
        container.appendChild(btn);
    });
    
    document.getElementById("chat").appendChild(container);
    document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
}

    En estricto cumplimiento de las directrices académicas de la Facultad de Derecho[cite: 277, 508]:<br>
    1. Se advierte la necesidad absoluta de verificar de forma humana autónoma las normas, tratados internacionales y doctrina aplicables a esta transacción antes de su implementación profesional[cite: 458].<br>

    3. Esta interfaz provee una sugerencia de automatización de estructura lógica y no reemplaza el criterio ni el concepto jurídico profesional final de un abogado experto[cite: 461].<br>
    4. La revisión humana de la minuta final es obligatoria para mitigar riesgos de asimetría contractual transfronteriza[cite: 462, 463].`;
    
    addMsg(dueDiligenceText, "bot", true);
    
    setTimeout(() => {
        addMsg("Hola. Soy tu interfaz de asistencia jurídica estructurada para el desarrollo del caso práctico internacional del proyecto <b>PAYBRIDGE 360</b>[cite: 330]. Guiaré la recolección de las decisiones del grupo para ensamblar la minuta final[cite: 292, 452].", "bot");
        siguientePaso();
    }, 1500);
}

function siguientePaso(){
    if(paso < flujoPreguntas.length){
        let item = flujoPreguntas[paso];
        addMsg(item.pregunta, "bot");
        if(item.riesgo) {
            setTimeout(() => addMsg(item.riesgo, "bot", true), 300);
        }
        setTimeout(() => renderOpciones(item.opciones), 500);
    } else {
        addMsg("🎉 <b>¡Flujo de toma de decisiones jurídicas internacionales completado con éxito!</b><br>Las variables críticas han sido insertadas dentro del cuerpo de la minuta oficial compartida.", "bot");
        document.getElementById("btnWord").style.display = "block";
        document.getElementById("input").placeholder = "Flujo completado. Descarga el reporte Word.";
        document.getElementById("input").disabled = true;
    }
}

function procesarRespuesta(textoMostrado, valorJuridico) {
    // Eliminar los botones anteriores para mantener limpia la interfaz estética
    let contenedores = document.querySelectorAll('.btn-container');
    if(contenedores.length > 0) {
        contenedores[contenedores.length - 1].remove();
    }

    addMsg(textoMostrado, "user");
    
    let campoActual = flujoPreguntas[paso].campo;
    datosMinuta[campoActual] = valorJuridico;
    
    historial += `<p><b>Pregunta Circunstancia [${campoActual.toUpperCase()}]:</b> Opción adoptada por el grupo: <i>${textoMostrado}</i>. Texto contractual inyectado: "${valorJuridico}".</p>`;
    
    paso++;
    setTimeout(siguientePaso, 600);
}

function sendText() {
    let input = document.getElementById("input");
    let text = input.value.trim();
    if(!text) return;
    
    // Si el usuario escribe libremente, se almacena de forma genérica en el campo actual del flujo
    if(paso < flujoPreguntas.length) {
        procesarRespuesta(text, text);
    } else {
        addMsg(text, "user");
    }
    input.value = "";
}
